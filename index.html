<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mm's Blog - 大模型推理研究</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.8;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 60px 0;
            color: white;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .posts {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .post-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .post-card h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .post-card .meta {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        
        .post-card .summary {
            color: #555;
        }
        
        footer {
            text-align: center;
            padding: 40px;
            color: white;
            opacity: 0.8;
        }
        
        .tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-right: 8px;
        }
        
        .tag.vllm { background: #f59e0b; }
        .tag.arxiv { background: #10b981; }
        .tag.tutorial { background: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 mm's Blog</h1>
            <p>大模型推理优化 | 高性能计算 | 论文解读</p>
        </header>
        
        <div class="posts">
            <a href="posts/nano-vllm-analysis.html" class="post-card">
                <h2>Nano-vLLM: 轻量级 vLLM 实现分析</h2>
                <div class="meta">
                    <span>📅 2026-04-18</span> &nbsp;|&nbsp; 
                    <span>👤 mm</span>
                </div>
                <div class="summary">
                    <span class="tag vllm">vLLM</span>
                    <span class="tag tutorial">教程</span>
                    <p style="margin-top: 10px;">
                        一个仅 1400 行的 vLLM 从零实现，适合教学使用的轻量级推理引擎...
                    </p>
                </div>
            </a>
            
            <div class="post-card" style="opacity: 0.7; cursor: default;">
                <h2>📝 更多文章即将到来</h2>
                <div class="meta">
                    <span>待更新</span>
                </div>
                <p>专注大模型量化、蒸馏、剪枝等技术研究，持续更新中...</p>
            </div>
        </div>
        
        <footer>
            <p>© 2026 mm's Blog · 高性能计算研究</p>
        </footer>
    </div>
</body>
</html>
